metadata:
  client_id: GRUPO_K
  client_name: Grupo K
  active: true
  gsheet_output: 1wjSl0Tnrot-LDx87nKvR3MBPy_ASMaDXTSFv4jTwvfg

plans:
  PLAN_859:
    active: true
    name: Asesor Venta
    description: Comisiones para Asesor de Venta

    data_sources:
      - id: employees
        type: buk
        config:
          endpoint: https://mk.buk.cl/api/v1/chile/employees
          auth_token: 4rpH4uPQtL2qLQKUHjqmjPF9
          paginated: true
          page_size: 100

      - id: sales
        type: api
        config:
          base_url: http://webapi.mk.cl
          path: /mk/GetFileBaseComisionProyecto
          headers:
            XApiKey: pgH7QzFHJx4w46fI~5Uzi4RvtTwlEXp
          response_format: csv
          separator: ";"
          encoding: utf-8
          timeout: 60

      - id: commission_tiers
        type: json
        config:
          path: data/grupok/asesor_venta.json

    data_merge_strategy:
      type: custom
      config:
        strategy_name: grupok_sales_advisor_merge
        employees_key: employees
        sales_key: sales
        tiers_key: commission_tiers

    script:
      module: src.context.commissions.infrastructure.processing_strategies.custom.grupok.sales_advisor_strategy
      class: GrupoKSalesAdvisorStrategy
      params:
        rep_id_filter: null
        role_filter: Asesor de venta

    output:
      tab_name: PLAN_859
      clear_before_write: true

