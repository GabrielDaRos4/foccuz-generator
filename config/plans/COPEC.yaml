plans:
  PLAN_800:
    active: true
    name: PLAN TCT - Clientes Nuevos
    description: Plan de comisiones para producto TCT - Volumen clientes nuevos durante primeros 3 meses

    data_sources:
      - id: ventas_historicas
        type: s3
        config:
          bucket: foccuz-sftp-production
          prefix: copec/Proy-ComAtendedores/venta_mensual_tct_tae/
          pattern: "*_venta_mensual_tct_tae*.csv"
          separator: '|'
          encoding: utf-8
          max_files: 15
          sort_order: desc
          current_key: ventas_mes_actual
          historical_key_prefix: ventas_mes

    data_merge_strategy:
      type: custom
      config:
        strategy_name: copec_new_client_merge

    script:
      module: src.context.commissions.infrastructure.processing_strategies.custom.copec.new_client.new_client_commission_strategy
      class: CopecNewClientCommissionStrategy
      params:
        product_type: TCT
        discount_percentage: 0.08
        max_factor: 6.0
        bono_nuevo: 10000
        factor_minimo: 0.5
        months_lookback: 14
        rep_id_filter: null

    output:
      tab_name: PLAN_800
      clear_before_write: true


